<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hvala — Amelo Design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --purple: #6D28D9; --cyan: #0891B2; --grad: linear-gradient(135deg, #6D28D9 0%, #0891B2 100%); }
  body { font-family: 'Inter', sans-serif; background: #F5F4FF; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
  .card { background: white; border-radius: 32px; padding: 64px 56px; max-width: 520px; width: 100%; text-align: center; box-shadow: 0 8px 50px rgba(0,0,0,0.08); }
  .icon { width: 80px; height: 80px; border-radius: 24px; background: var(--grad); display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; }
  .icon svg { width: 40px; height: 40px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  h1 { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: #0D0D1A; margin-bottom: 16px; }
  p { color: #64748B; font-size: 16px; line-height: 1.7; margin-bottom: 40px; }
  .btn { display: inline-block; background: var(--grad); color: white; text-decoration: none; padding: 14px 36px; border-radius: 100px; font-weight: 700; font-size: 15px; transition: opacity 0.2s, transform 0.2s; }
  .btn:hover { opacity: 0.9; transform: translateY(-2px); }
  .footer-note { margin-top: 24px; font-size: 13px; color: #94A3B8; }
</style>
</head>
<body>

<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <h1>Hvala na upitu!</h1>
  <p>Primili smo Vašu poruku i javit ćemo Vam se u roku od <strong>24 sata</strong> s prijedlogom i odgovorima na sva Vaša pitanja.</p>
  <a href="index.html" class="btn">Povratak na početnu</a>
  <p class="footer-note">© 2025 Amelo Design &nbsp;·&nbsp; info@amelodesign.com</p>
</div>

</body>
</html>
